# Azure Kubernetes Service (AKS) Configuration
# InferOps — Production Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inferops-bff
  namespace: inferops
  labels:
    app: inferops-bff
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: inferops-bff
  template:
    metadata:
      labels:
        app: inferops-bff
    spec:
      containers:
        - name: bff
          image: inferopsacr.azurecr.io/inferops-bff:latest
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: "production"
            - name: BFF_PORT
              value: "4000"
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: inferops-config
                  key: frontend-url
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: inferops-secrets
                  key: ai-api-key
            - name: AZURE_MONITOR_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: inferops-secrets
                  key: azure-monitor-connection-string
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: inferops-bff-service
  namespace: inferops
spec:
  selector:
    app: inferops-bff
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: inferops-ingress
  namespace: inferops
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.inferops.ai
      secretName: inferops-tls
  rules:
    - host: api.inferops.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: inferops-bff-service
                port:
                  number: 80
