# Azure Kubernetes Service (AKS) Configuration
# DevPulse AI — Production Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devpulse-bff
  namespace: devpulse
  labels:
    app: devpulse-bff
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devpulse-bff
  template:
    metadata:
      labels:
        app: devpulse-bff
    spec:
      containers:
        - name: bff
          image: devpulseacr.azurecr.io/devpulse-bff:latest
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: "production"
            - name: BFF_PORT
              value: "4000"
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: devpulse-config
                  key: frontend-url
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: devpulse-secrets
                  key: ai-api-key
            - name: AZURE_MONITOR_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: devpulse-secrets
                  key: azure-monitor-connection-string
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: devpulse-bff-service
  namespace: devpulse
spec:
  selector:
    app: devpulse-bff
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devpulse-ingress
  namespace: devpulse
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.devpulse.ai
      secretName: devpulse-tls
  rules:
    - host: api.devpulse.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devpulse-bff-service
                port:
                  number: 80
